<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Court AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main">

    <h1>⚖️ Dashboard</h1>

    <div class="card">
        <h2>System Status</h2>
        <p>Backend: Connected</p>
        <p>Model: Active</p>
    </div>

    <div class="card">
        <h2>Quick Prediction</h2>

        <textarea id="textInput" placeholder="Enter case..."></textarea>

        <button onclick="predict()">Predict</button>

        <div id="result"></div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
